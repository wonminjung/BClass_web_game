<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a52"/>
      <stop offset="50%" stop-color="#2d2d35"/>
      <stop offset="100%" stop-color="#1a1a22"/>
    </linearGradient>
    <filter id="curseGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Purple aura -->
  <ellipse cx="32" cy="34" rx="20" ry="18" fill="#7c3aed" opacity="0.08" filter="url(#curseGlow)"/>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="14" ry="3" fill="#000" opacity="0.3"/>
  <!-- Steel ingot - dark metal chunk -->
  <path d="M14 28 L22 16 L50 16 L50 28 L46 44 L18 44 L14 28Z" fill="url(#steel)" stroke="#111118" stroke-width="1.5"/>
  <!-- Top face -->
  <path d="M14 28 L22 16 L50 16 L50 28 Z" fill="#3a3a44" stroke="#111118" stroke-width="1"/>
  <!-- Side highlight -->
  <path d="M14 28 L18 44 L22 44 L18 28Z" fill="#52525b" opacity="0.4"/>
  <!-- Metal texture lines -->
  <line x1="20" y1="20" x2="46" y2="20" stroke="#52525b" stroke-width="0.5" opacity="0.5"/>
  <line x1="18" y1="32" x2="44" y2="32" stroke="#52525b" stroke-width="0.4" opacity="0.3"/>
  <line x1="17" y1="38" x2="45" y2="38" stroke="#52525b" stroke-width="0.4" opacity="0.25"/>
  <!-- Cursed runes -->
  <g filter="url(#curseGlow)" opacity="0.9">
    <!-- Rune 1 -->
    <path d="M24 24 L26 20 L28 24 L26 28Z" fill="none" stroke="#a855f7" stroke-width="1.2"/>
    <line x1="26" y1="20" x2="26" y2="28" stroke="#a855f7" stroke-width="0.8"/>
    <!-- Rune 2 -->
    <path d="M34 22 L36 18 L38 22 M34 22 L36 26 L38 22" fill="none" stroke="#c084fc" stroke-width="1.2"/>
    <!-- Rune 3 -->
    <path d="M24 34 L28 30 L28 38 L24 34 M28 34 L32 30 L32 38Z" fill="none" stroke="#a855f7" stroke-width="1"/>
    <!-- Rune 4 -->
    <circle cx="38" cy="34" r="3" fill="none" stroke="#c084fc" stroke-width="1"/>
    <line x1="38" y1="31" x2="38" y2="37" stroke="#c084fc" stroke-width="0.8"/>
    <line x1="35" y1="34" x2="41" y2="34" stroke="#c084fc" stroke-width="0.8"/>
  </g>
  <!-- Purple energy wisps -->
  <path d="M12 26 C10 22, 14 18, 16 20" stroke="#a855f7" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M50 22 C52 18, 54 20, 52 24" stroke="#c084fc" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Corner glow points -->
  <circle cx="22" cy="16" r="1.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="50" cy="16" r="1.5" fill="#c084fc" opacity="0.25"/>
</svg>