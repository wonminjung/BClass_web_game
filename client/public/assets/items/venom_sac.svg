<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="sac" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="sacInner" cx="0.35" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Toxic glow -->
  <ellipse cx="32" cy="34" rx="18" ry="16" fill="#22c55e" opacity="0.1" filter="url(#glow)"/>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="10" ry="3" fill="#000" opacity="0.3"/>
  <!-- Main sac body - bulbous -->
  <path d="M18 32 C18 20, 24 12, 32 12 C40 12, 46 20, 46 32 C46 44, 40 52, 32 52 C24 52, 18 44, 18 32Z" fill="url(#sac)" stroke="#581c87" stroke-width="1.5"/>
  <!-- Inner liquid visible through translucent membrane -->
  <path d="M22 32 C22 24, 26 18, 32 18 C38 18, 42 24, 42 32 C42 40, 38 46, 32 46 C26 46, 22 40, 22 32Z" fill="url(#sacInner)"/>
  <!-- Vein lines on membrane -->
  <path d="M24 24 C28 28, 30 36, 28 44" stroke="#581c87" stroke-width="0.8" opacity="0.5" fill="none"/>
  <path d="M38 20 C36 28, 38 36, 40 42" stroke="#581c87" stroke-width="0.7" opacity="0.4" fill="none"/>
  <path d="M26 18 C32 22, 36 28, 34 36" stroke="#581c87" stroke-width="0.6" opacity="0.3" fill="none"/>
  <!-- Top stem/attachment point -->
  <path d="M28 12 C28 8, 30 6, 32 6 C34 6, 36 8, 36 12" fill="#581c87" stroke="#3b0764" stroke-width="1"/>
  <!-- Toxic bubbles inside -->
  <circle cx="28" cy="30" r="2.5" fill="#4ade80" opacity="0.4"/>
  <circle cx="35" cy="36" r="1.8" fill="#a855f7" opacity="0.35"/>
  <circle cx="30" cy="40" r="1.5" fill="#4ade80" opacity="0.3"/>
  <!-- Highlight -->
  <ellipse cx="27" cy="24" rx="3" ry="4" fill="white" opacity="0.15" transform="rotate(-20 27 24)"/>
  <!-- Drip -->
  <path d="M32 52 C32 54, 33 56, 32 58 C31 56, 32 54, 32 52Z" fill="#22c55e" opacity="0.6"/>
</svg>