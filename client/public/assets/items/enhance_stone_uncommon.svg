<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gu1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DDB85"/>
      <stop offset="50%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1FA85C"/>
    </linearGradient>
    <linearGradient id="gu2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5AEEA0"/>
      <stop offset="100%" stop-color="#22A85A"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="3" fill="#2ECC71" opacity="0.2"/>
  <!-- Hexagonal crystal -->
  <polygon points="32,8 48,18 48,42 32,52 16,42 16,18" fill="url(#gu1)" stroke="#1A9050" stroke-width="1.5"/>
  <!-- Inner facet -->
  <polygon points="32,14 42,21 42,39 32,46 22,39 22,21" fill="url(#gu2)" opacity="0.6"/>
  <!-- Light reflection -->
  <polygon points="32,14 42,21 32,24 22,21" fill="white" opacity="0.2"/>
  <!-- Edge highlights -->
  <line x1="32" y1="8" x2="48" y2="18" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <line x1="32" y1="8" x2="16" y2="18" stroke="white" stroke-width="0.5" opacity="0.25"/>
  <!-- Center glow -->
  <circle cx="32" cy="30" r="4" fill="#5AEEA0" opacity="0.3"/>
  <circle cx="32" cy="30" r="2" fill="white" opacity="0.15"/>
</svg>