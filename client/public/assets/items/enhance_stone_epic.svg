<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ge1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BB7FD6"/>
      <stop offset="50%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#7D3C98"/>
    </linearGradient>
    <linearGradient id="ge2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D4A0E8"/>
      <stop offset="100%" stop-color="#8344A8"/>
    </linearGradient>
    <radialGradient id="geGlow" cx="0.5" cy="0.46" r="0.5">
      <stop offset="0%" stop-color="#D4A0E8" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#9B59B6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
    </radialGradient>
    <filter id="eGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eSoftGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="3" fill="#9B59B6" opacity="0.3"/>
  <!-- Outer glow aura -->
  <polygon points="32,6 50,17 50,43 32,54 14,43 14,17" fill="url(#geGlow)" filter="url(#eGlow)"/>
  <!-- Hexagonal crystal -->
  <polygon points="32,8 48,18 48,42 32,52 16,42 16,18" fill="url(#ge1)" stroke="#6C2D8A" stroke-width="1.5"/>
  <!-- Inner facet -->
  <polygon points="32,14 42,21 42,39 32,46 22,39 22,21" fill="url(#ge2)" opacity="0.6"/>
  <!-- Light reflection -->
  <polygon points="32,14 42,21 32,24 22,21" fill="white" opacity="0.25"/>
  <!-- Edge highlights -->
  <line x1="32" y1="8" x2="48" y2="18" stroke="#D4A0E8" stroke-width="0.7" opacity="0.5"/>
  <line x1="32" y1="8" x2="16" y2="18" stroke="#D4A0E8" stroke-width="0.5" opacity="0.35"/>
  <!-- Center glow -->
  <circle cx="32" cy="30" r="6" fill="#D4A0E8" opacity="0.3" filter="url(#eSoftGlow)"/>
  <circle cx="32" cy="30" r="3" fill="white" opacity="0.25"/>
  <!-- Sparkle rays -->
  <g filter="url(#eSoftGlow)" opacity="0.5">
    <line x1="32" y1="22" x2="32" y2="18" stroke="#D4A0E8" stroke-width="1"/>
    <line x1="38" y1="27" x2="41" y2="25" stroke="#D4A0E8" stroke-width="1"/>
    <line x1="26" y1="27" x2="23" y2="25" stroke="#D4A0E8" stroke-width="1"/>
  </g>
</svg>