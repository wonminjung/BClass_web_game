<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cork / stopper -->
  <rect x="23" y="4" width="18" height="8" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>
  <rect x="25" y="2" width="14" height="4" rx="1" fill="#A07828" stroke="#5C4A0E" stroke-width="1"/>
  <!-- Cork highlight -->
  <rect x="27" y="3" width="4" height="2" rx="0.5" fill="#C49A3C" opacity="0.6"/>
  <!-- Cork ring -->
  <rect x="22" y="10" width="20" height="2" rx="1" fill="#6B5210" stroke="#4A3A0A" stroke-width="0.5"/>

  <!-- Bottle body - wider, rounder shape -->
  <path d="M26 12 L26 18 Q26 20 24 22 L19 28 Q16 32 16 36 L16 50 Q16 58 24 58 L40 58 Q48 58 48 50 L48 36 Q48 32 45 28 L40 22 Q38 20 38 18 L38 12 Z"
        fill="#3D1A1A" stroke="#2A0E0E" stroke-width="1.5"/>

  <!-- Glass tint -->
  <path d="M26 12 L26 18 Q26 20 24 22 L19 28 Q16 32 16 36 L16 50 Q16 58 24 58 L40 58 Q48 58 48 50 L48 36 Q48 32 45 28 L40 22 Q38 20 38 18 L38 12 Z"
        fill="rgba(80,20,20,0.25)" stroke="none"/>

  <!-- Red liquid fill - generous amount -->
  <path d="M17 32 L17 50 Q17 57 24.5 57 L39.5 57 Q47 57 47 50 L47 32 Q47 30 45 28 L41 23 Q39.5 21 39 19 L25 19 Q24.5 21 23 23 L19 28 Q17 30 17 32 Z"
        fill="#C01525" opacity="0.9"/>

  <!-- Liquid deep layer -->
  <path d="M18 44 L18 50 Q18 56 25 56 L39 56 Q46 56 46 50 L46 44 Z"
        fill="#8B0A18" opacity="0.5"/>

  <!-- Liquid bubbles / highlights -->
  <ellipse cx="28" cy="36" rx="5" ry="7" fill="#E83848" opacity="0.35"/>
  <ellipse cx="38" cy="44" rx="3" ry="4" fill="#D02535" opacity="0.3"/>

  <!-- Glass shine left -->
  <path d="M20 30 L19 48 Q19 52 21 54" stroke="rgba(255,200,200,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Glass neck shine -->
  <path d="M28 13 L28 17" stroke="rgba(255,220,220,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="23" cy="34" r="1.2" fill="white" opacity="0.45"/>
  <circle cx="36" cy="28" r="0.8" fill="white" opacity="0.3"/>

  <!-- Label band on bottle -->
  <rect x="18" y="42" width="28" height="6" rx="1" fill="#1A0808" opacity="0.3"/>
  <!-- Cross symbol on label -->
  <line x1="30" y1="43.5" x2="34" y2="43.5" stroke="#E03040" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="41.5" x2="32" y2="46.5" stroke="#E03040" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
</svg>