<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="mythGlow"><stop offset="0%" stop-color="#E11D48" stop-opacity="0.8"/><stop offset="100%" stop-color="#E11D48" stop-opacity="0"/></radialGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7F1D1D"/><stop offset="100%" stop-color="#4A1010"/></linearGradient>
    <radialGradient id="gem" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFD1DC"/><stop offset="50%" stop-color="#E11D48"/><stop offset="100%" stop-color="#9F1239"/></radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#mythGlow)" opacity="0.4"/>
  <!-- Belt strap -->
  <path d="M4,26 Q4,22 8,22 L56,22 Q60,22 60,26 L60,38 Q60,42 56,42 L8,42 Q4,42 4,38Z" fill="url(#leather)" stroke="#9F1239" stroke-width="1.2"/>
  <!-- Belt sections -->
  <rect x="8" y="24" width="12" height="16" rx="1" fill="#4A1010" stroke="#7F1D1D" stroke-width="0.6"/>
  <rect x="44" y="24" width="12" height="16" rx="1" fill="#4A1010" stroke="#7F1D1D" stroke-width="0.6"/>
  <!-- Decorative studs -->
  <circle cx="14" cy="32" r="2" fill="#9F1239" stroke="#E11D48" stroke-width="0.5"/>
  <circle cx="50" cy="32" r="2" fill="#9F1239" stroke="#E11D48" stroke-width="0.5"/>
  <!-- Central buckle -->
  <rect x="22" y="22" width="20" height="20" rx="3" fill="#7F1D1D" stroke="#9F1239" stroke-width="1"/>
  <rect x="25" y="25" width="14" height="14" rx="2" fill="#4A1010" stroke="#9F1239" stroke-width="0.6"/>
  <!-- Rose gem in buckle -->
  <polygon points="32,26 38,32 32,38 26,32" fill="url(#gem)" stroke="#FFD1DC" stroke-width="0.6"/>
  <polygon points="32,28 36,32 32,36 28,32" fill="#FFD1DC" opacity="0.3"/>
  <circle cx="32" cy="32" r="2" fill="#FFC0CB" opacity="0.6"/>
  <!-- Hanging chains -->
  <path d="M24,42 L22,50 L26,50 L24,42" fill="#9F1239" stroke="#E11D48" stroke-width="0.5"/>
  <path d="M40,42 L38,50 L42,50 L40,42" fill="#9F1239" stroke="#E11D48" stroke-width="0.5"/>
  <circle cx="24" cy="52" r="2" fill="#E11D48" stroke="#FFD1DC" stroke-width="0.4"/>
  <circle cx="40" cy="52" r="2" fill="#E11D48" stroke="#FFD1DC" stroke-width="0.4"/>
  <!-- Shimmer particles -->
  <circle cx="8" cy="10" r="1.5" fill="#FFD1DC" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="56" cy="12" r="1" fill="#E11D48" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="6" cy="56" r="1.2" fill="#FFC0CB" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="58" cy="58" r="1" fill="#FFD1DC" opacity="0.8"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="32" cy="6" r="0.8" fill="#E11D48" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
</svg>