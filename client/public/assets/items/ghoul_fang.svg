      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="40%" stop-color="#d4c472"/>
      <stop offset="100%" stop-color="#a89045"/>
    </linearGradient>
    <linearGradient id="slime" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="10" ry="3" fill="#000" opacity="0.3"/>
