  <path d="M30 52 C30 54, 31 57, 30 60 C30 62, 29 62, 29 60 C29 57, 29 54, 30 52Z" fill="url(#slime)"/>
  <path d="M36 36 C37 38, 38 42, 37 44 C37 45, 36 45, 36 43 C36 41, 36 38, 36 36Z" fill="url(#slime)"/>
  <!-- Slime glow -->
