<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="mythGlow"><stop offset="0%" stop-color="#E11D48" stop-opacity="0.8"/><stop offset="100%" stop-color="#E11D48" stop-opacity="0"/></radialGradient>
    <radialGradient id="orbCore" cx="50%" cy="40%"><stop offset="0%" stop-color="#FFD1DC"/><stop offset="40%" stop-color="#FFC0CB"/><stop offset="70%" stop-color="#E11D48"/><stop offset="100%" stop-color="#9F1239"/></radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#mythGlow)" opacity="0.4"/>
  <!-- Outer ring -->
  <circle cx="32" cy="30" r="20" fill="none" stroke="#9F1239" stroke-width="2"/>
  <circle cx="32" cy="30" r="18" fill="none" stroke="#E11D48" stroke-width="0.8" opacity="0.5"/>
  <!-- Ring decorations -->
  <circle cx="32" cy="10" r="3" fill="#7F1D1D" stroke="#9F1239" stroke-width="0.8"/>
  <circle cx="32" cy="10" r="1.2" fill="#E11D48" opacity="0.8"/>
  <circle cx="12" cy="30" r="3" fill="#7F1D1D" stroke="#9F1239" stroke-width="0.8"/>
  <circle cx="12" cy="30" r="1.2" fill="#E11D48" opacity="0.8"/>
  <circle cx="52" cy="30" r="3" fill="#7F1D1D" stroke="#9F1239" stroke-width="0.8"/>
  <circle cx="52" cy="30" r="1.2" fill="#E11D48" opacity="0.8"/>
  <circle cx="32" cy="50" r="3" fill="#7F1D1D" stroke="#9F1239" stroke-width="0.8"/>
  <circle cx="32" cy="50" r="1.2" fill="#E11D48" opacity="0.8"/>
  <!-- Floating central orb -->
  <circle cx="32" cy="30" r="10" fill="url(#orbCore)"/>
  <circle cx="32" cy="30" r="7" fill="none" stroke="#FFD1DC" stroke-width="0.6" opacity="0.4"/>
  <circle cx="30" cy="27" r="3" fill="#FFD1DC" opacity="0.3"/>
  <circle cx="32" cy="30" r="3" fill="#FFC0CB" opacity="0.4"/>
  <!-- Orbiting particles (animated) -->
  <circle cx="32" cy="16" r="1.5" fill="#FFD1DC" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 32 30" to="360 32 30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="44" r="1.2" fill="#E11D48" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="180 32 30" to="540 32 30" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Energy lines connecting to orb -->
  <line x1="15" y1="30" x2="22" y2="30" stroke="#E11D48" stroke-width="0.8" opacity="0.4"/>
  <line x1="42" y1="30" x2="49" y2="30" stroke="#E11D48" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="13" x2="32" y2="20" stroke="#E11D48" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="40" x2="32" y2="47" stroke="#E11D48" stroke-width="0.8" opacity="0.4"/>
  <!-- Shimmer particles -->
  <circle cx="6" cy="6" r="1.5" fill="#FFD1DC" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="58" cy="8" r="1" fill="#E11D48" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="4" cy="56" r="1.2" fill="#FFC0CB" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="60" cy="58" r="1" fill="#FFD1DC" opacity="0.8"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="8" cy="58" r="0.8" fill="#E11D48" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
</svg>