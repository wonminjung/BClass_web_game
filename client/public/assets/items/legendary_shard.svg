<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="shard" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="shardEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="legendGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="30" r="26" fill="#fbbf24" opacity="0.08" filter="url(#legendGlow)"/>
  <!-- Light rays -->
  <g filter="url(#legendGlow)" opacity="0.3">
    <line x1="32" y1="4" x2="32" y2="14" stroke="#fef3c7" stroke-width="1.5"/>
    <line x1="50" y1="12" x2="44" y2="18" stroke="#fef3c7" stroke-width="1.2"/>
    <line x1="14" y1="12" x2="20" y2="18" stroke="#fef3c7" stroke-width="1.2"/>
    <line x1="54" y1="30" x2="46" y2="30" stroke="#fef3c7" stroke-width="1"/>
    <line x1="10" y1="30" x2="18" y2="30" stroke="#fef3c7" stroke-width="1"/>
    <line x1="48" y1="46" x2="42" y2="40" stroke="#fef3c7" stroke-width="0.8"/>
    <line x1="16" y1="46" x2="22" y2="40" stroke="#fef3c7" stroke-width="0.8"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="8" ry="2.5" fill="#b45309" opacity="0.2"/>
  <!-- Main crystal shard -->
  <polygon points="32,6 40,22 42,40 36,54 28,54 22,40 24,22" fill="url(#shard)" stroke="#b45309" stroke-width="1"/>
  <!-- Facet lines -->
  <polygon points="32,6 40,22 32,18 24,22" fill="#fef3c7" opacity="0.4"/>
  <polygon points="32,18 40,22 42,40 32,36" fill="url(#shardEdge)" opacity="0.3"/>
  <polygon points="32,18 24,22 22,40 32,36" fill="#f59e0b" opacity="0.2"/>
  <polygon points="32,36 42,40 36,54 32,50" fill="#d97706" opacity="0.3"/>
  <polygon points="32,36 22,40 28,54 32,50" fill="#b45309" opacity="0.2"/>
  <!-- Central line -->
  <line x1="32" y1="6" x2="32" y2="54" stroke="#fbbf24" stroke-width="0.6" opacity="0.5"/>
  <!-- Inner glow -->
  <polygon points="32,14 36,26 34,42 32,48 30,42 28,26" fill="#fffbeb" opacity="0.25"/>
  <!-- Sparkle points -->
  <g filter="url(#softGlow2)">
    <circle cx="32" cy="12" r="2" fill="white" opacity="0.7"/>
    <circle cx="38" cy="28" r="1.5" fill="#fef3c7" opacity="0.6"/>
    <circle cx="26" cy="32" r="1.2" fill="#fef3c7" opacity="0.5"/>
    <circle cx="34" cy="44" r="1" fill="white" opacity="0.4"/>
  </g>
  <!-- Edge highlights -->
  <line x1="26" y1="20" x2="32" y2="8" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <line x1="38" y1="20" x2="32" y2="8" stroke="white" stroke-width="0.6" opacity="0.2"/>
</svg>