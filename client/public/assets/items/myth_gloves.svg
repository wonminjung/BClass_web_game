<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="mythGlow"><stop offset="0%" stop-color="#E11D48" stop-opacity="0.8"/><stop offset="100%" stop-color="#E11D48" stop-opacity="0"/></radialGradient>
    <linearGradient id="gauntlet" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7F1D1D"/><stop offset="100%" stop-color="#4A1010"/></linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#mythGlow)" opacity="0.4"/>
  <!-- Gauntlet base -->
  <path d="M18,56 L18,28 Q18,22 24,20 L40,20 Q46,22 46,28 L46,56 Q46,60 40,60 L24,60 Q18,60 18,56Z" fill="url(#gauntlet)" stroke="#9F1239" stroke-width="1.2"/>
  <!-- Fingers -->
  <rect x="20" y="8" width="5" height="16" rx="2" fill="#4A1010" stroke="#9F1239" stroke-width="0.8"/>
  <rect x="27" y="4" width="5" height="20" rx="2" fill="#4A1010" stroke="#9F1239" stroke-width="0.8"/>
  <rect x="34" y="6" width="5" height="18" rx="2" fill="#4A1010" stroke="#9F1239" stroke-width="0.8"/>
  <rect x="41" y="10" width="5" height="14" rx="2" fill="#4A1010" stroke="#9F1239" stroke-width="0.8"/>
  <!-- Thumb -->
  <path d="M14,28 Q10,24 12,18 L16,16 Q18,22 18,28Z" fill="#4A1010" stroke="#9F1239" stroke-width="0.8"/>
  <!-- Glowing runes -->
  <circle cx="26" cy="34" r="3" fill="none" stroke="#E11D48" stroke-width="1" opacity="0.8"/>
  <circle cx="26" cy="34" r="1.2" fill="#FFD1DC" opacity="0.6"/>
  <circle cx="38" cy="34" r="3" fill="none" stroke="#E11D48" stroke-width="1" opacity="0.8"/>
  <circle cx="38" cy="34" r="1.2" fill="#FFD1DC" opacity="0.6"/>
  <path d="M24,42 L28,42 M26,40 L26,44" stroke="#E11D48" stroke-width="0.8" opacity="0.7"/>
  <path d="M36,42 L40,42 M38,40 L38,44" stroke="#E11D48" stroke-width="0.8" opacity="0.7"/>
  <!-- Wrist band -->
  <rect x="16" y="50" width="32" height="5" rx="1" fill="#7F1D1D" stroke="#9F1239" stroke-width="0.8"/>
  <circle cx="32" cy="52" r="2" fill="#E11D48" stroke="#FFD1DC" stroke-width="0.4"/>
  <!-- Shimmer particles -->
  <circle cx="8" cy="6" r="1.5" fill="#FFD1DC" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="54" cy="8" r="1" fill="#E11D48" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="6" cy="48" r="1.2" fill="#FFC0CB" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="56" cy="50" r="1" fill="#FFD1DC" opacity="0.8"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="50" cy="4" r="0.8" fill="#E11D48" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
</svg>