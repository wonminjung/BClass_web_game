<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="eerieGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="boneGrad" cx="0.5" cy="0.4">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#D4C8B0"/>
    </radialGradient>
  </defs>
  <!-- Eerie background glow -->
  <circle cx="32" cy="34" r="18" fill="#88DDAA" opacity="0.08" filter="url(#eerieGlow)"/>
  <!-- Ring body - outer -->
  <circle cx="32" cy="38" r="16" fill="none" stroke="url(#boneGrad)" stroke-width="6"/>
  <!-- Ring body - shading -->
  <circle cx="32" cy="38" r="16" fill="none" stroke="#B8A890" stroke-width="6" opacity="0.3" stroke-dasharray="4,46" stroke-dashoffset="25"/>
  <!-- Ring highlight -->
  <circle cx="32" cy="38" r="16" fill="none" stroke="#FFF8F0" stroke-width="1" opacity="0.3"/>
  <!-- Ring inner edge shadow -->
  <circle cx="32" cy="38" r="13" fill="none" stroke="#9B8E78" stroke-width="0.8" opacity="0.5"/>
  <!-- Bone texture lines on ring -->
  <path d="M18,30 Q17,32 16,34" fill="none" stroke="#C4B8A0" stroke-width="0.5" opacity="0.6"/>
  <path d="M46,30 Q47,32 48,34" fill="none" stroke="#C4B8A0" stroke-width="0.5" opacity="0.6"/>
  <path d="M20,48 Q22,50 24,50" fill="none" stroke="#C4B8A0" stroke-width="0.5" opacity="0.6"/>
  <path d="M44,48 Q42,50 40,50" fill="none" stroke="#C4B8A0" stroke-width="0.5" opacity="0.6"/>
  <!-- Skull mount base -->
  <ellipse cx="32" cy="22" rx="8" ry="3" fill="#D4C8B0" stroke="#9B8E78" stroke-width="0.8"/>
  <!-- Skull -->
  <ellipse cx="32" cy="17" rx="7" ry="8" fill="#F0E8D8" stroke="#B8A890" stroke-width="1"/>
  <!-- Skull top roundness -->
  <ellipse cx="32" cy="14" rx="6.5" ry="6" fill="#F5F0E8" opacity="0.5"/>
  <!-- Eye sockets -->
  <ellipse cx="28.5" cy="16" rx="2.2" ry="2.5" fill="#1A1A2E"/>
  <ellipse cx="35.5" cy="16" rx="2.2" ry="2.5" fill="#1A1A2E"/>
  <!-- Eye glow -->
  <ellipse cx="28.5" cy="16" rx="1" ry="1.2" fill="#66DDAA" opacity="0.7" filter="url(#eerieGlow)"/>
  <ellipse cx="35.5" cy="16" rx="1" ry="1.2" fill="#66DDAA" opacity="0.7" filter="url(#eerieGlow)"/>
  <!-- Nose -->
  <path d="M31,19 L32,21 L33,19" fill="#1A1A2E" opacity="0.8"/>
  <!-- Mouth/teeth -->
  <line x1="28" y1="23" x2="36" y2="23" stroke="#B8A890" stroke-width="0.8"/>
  <line x1="29.5" y1="22" x2="29.5" y2="24" stroke="#B8A890" stroke-width="0.5"/>
  <line x1="32" y1="22" x2="32" y2="24" stroke="#B8A890" stroke-width="0.5"/>
  <line x1="34.5" y1="22" x2="34.5" y2="24" stroke="#B8A890" stroke-width="0.5"/>
  <!-- Skull highlight -->
  <ellipse cx="30" cy="12" rx="3" ry="2" fill="#FFFDF8" opacity="0.3"/>
</svg>