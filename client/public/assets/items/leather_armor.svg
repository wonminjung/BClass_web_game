<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="leatherGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
  </defs>
  <!-- Shoulder straps -->
  <path d="M16,14 Q20,10 26,12 L26,22 L16,24Z" fill="#7A5230" stroke="#4A2E1A" stroke-width="1"/>
  <path d="M48,14 Q44,10 38,12 L38,22 L48,24Z" fill="#7A5230" stroke="#4A2E1A" stroke-width="1"/>
  <!-- Main chest piece -->
  <path d="M18,22 L26,18 L32,20 L38,18 L46,22 L48,44 Q44,52 32,54 Q20,52 16,44Z" fill="url(#leatherGrad)" stroke="#4A2E1A" stroke-width="1.2"/>
  <!-- Collar/neckline -->
  <path d="M26,18 Q29,16 32,20 Q35,16 38,18" fill="none" stroke="#4A2E1A" stroke-width="1.2"/>
  <!-- Center seam -->
  <line x1="32" y1="20" x2="32" y2="52" stroke="#4A2E1A" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Horizontal stitching lines -->
  <line x1="20" y1="28" x2="44" y2="28" stroke="#4A2E1A" stroke-width="0.6" stroke-dasharray="1.5,2"/>
  <line x1="19" y1="36" x2="45" y2="36" stroke="#4A2E1A" stroke-width="0.6" stroke-dasharray="1.5,2"/>
  <line x1="20" y1="44" x2="44" y2="44" stroke="#4A2E1A" stroke-width="0.6" stroke-dasharray="1.5,2"/>
  <!-- Side stitch details -->
  <line x1="22" y1="24" x2="22" y2="46" stroke="#5C3A1E" stroke-width="0.5" stroke-dasharray="1,3"/>
  <line x1="42" y1="24" x2="42" y2="46" stroke="#5C3A1E" stroke-width="0.5" stroke-dasharray="1,3"/>
  <!-- Belt/buckle -->
  <rect x="18" y="34" width="28" height="3" rx="0.5" fill="#5C3A1E" stroke="#4A2E1A" stroke-width="0.6"/>
  <rect x="30" y="33.5" width="4" height="4" rx="0.5" fill="#B8860B" stroke="#8B6914" stroke-width="0.6"/>
  <circle cx="32" cy="35.5" r="0.8" fill="#8B6914"/>
  <!-- Leather texture highlights -->
  <path d="M24,24 Q28,26 26,30" fill="none" stroke="#9B7044" stroke-width="0.4" opacity="0.5"/>
  <path d="M40,24 Q36,26 38,30" fill="none" stroke="#9B7044" stroke-width="0.4" opacity="0.5"/>
  <!-- Shoulder rivets -->
  <circle cx="20" cy="18" r="1.2" fill="#B8860B" stroke="#8B6914" stroke-width="0.5"/>
  <circle cx="44" cy="18" r="1.2" fill="#B8860B" stroke="#8B6914" stroke-width="0.5"/>
</svg>