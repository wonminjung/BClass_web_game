<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="silk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#d4d4d8"/>
      <stop offset="100%" stop-color="#e8e8ec"/>
    </linearGradient>
    <linearGradient id="spool" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#44403c"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="12" ry="3" fill="#000" opacity="0.25"/>
  <!-- Spool core -->
  <rect x="28" y="14" width="8" height="36" rx="2" fill="url(#spool)" stroke="#292524" stroke-width="1"/>
  <!-- Spool top cap -->
  <ellipse cx="32" cy="14" rx="10" ry="4" fill="#57534e" stroke="#292524" stroke-width="1"/>
  <!-- Spool bottom cap -->
  <ellipse cx="32" cy="50" rx="10" ry="4" fill="#44403c" stroke="#292524" stroke-width="1"/>
  <!-- Silk wrapped around spool -->
  <ellipse cx="32" cy="24" rx="12" ry="4" fill="none" stroke="url(#silk)" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="32" cy="28" rx="13" ry="4.5" fill="none" stroke="#e4e4e7" stroke-width="1.8" opacity="0.85"/>
  <ellipse cx="32" cy="32" rx="14" ry="5" fill="none" stroke="url(#silk)" stroke-width="2" opacity="0.9"/>
  <ellipse cx="32" cy="36" rx="13" ry="4.5" fill="none" stroke="#e4e4e7" stroke-width="1.8" opacity="0.85"/>
  <ellipse cx="32" cy="40" rx="12" ry="4" fill="none" stroke="url(#silk)" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="32" cy="44" rx="11" ry="3.5" fill="none" stroke="#d4d4d8" stroke-width="1.2" opacity="0.7"/>
  <!-- Loose thread -->
  <path d="M44 32 C48 30, 50 26, 48 22 C46 18, 50 16, 52 18" stroke="#e8e8ec" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Shimmer highlights -->
  <line x1="20" y1="30" x2="22" y2="31" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="42" y1="34" x2="44" y2="33" stroke="white" stroke-width="1" opacity="0.5"/>
  <circle cx="32" cy="28" r="1" fill="white" opacity="0.4"/>
</svg>