<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Blade -->
  <polygon points="32,4 28,38 32,40 36,38" fill="#A8B0B8" stroke="#6B7280" stroke-width="1"/>
  <!-- Blade center line -->
  <line x1="32" y1="6" x2="32" y2="36" stroke="#C5CDD6" stroke-width="1.5" opacity="0.6"/>
  <!-- Blade edge highlight -->
  <polygon points="32,4 29,36 32,38" fill="#BFC8D1" opacity="0.4"/>
  <!-- Guard -->
  <rect x="22" y="38" width="20" height="4" rx="1" fill="#8B6914" stroke="#5C4A0E" stroke-width="0.8"/>
  <rect x="24" y="38.5" width="16" height="1" fill="#A67C00" opacity="0.5"/>
  <!-- Handle wrap -->
  <rect x="29" y="42" width="6" height="14" rx="1" fill="#6B4226" stroke="#4A2E1A" stroke-width="0.8"/>
  <!-- Handle leather wrapping -->
  <line x1="29" y1="45" x2="35" y2="44" stroke="#4A2E1A" stroke-width="0.8"/>
  <line x1="29" y1="48" x2="35" y2="47" stroke="#4A2E1A" stroke-width="0.8"/>
  <line x1="29" y1="51" x2="35" y2="50" stroke="#4A2E1A" stroke-width="0.8"/>
  <!-- Pommel -->
  <circle cx="32" cy="58" r="3" fill="#8B6914" stroke="#5C4A0E" stroke-width="0.8"/>
  <circle cx="32" cy="58" r="1.2" fill="#A67C00" opacity="0.6"/>
</svg>