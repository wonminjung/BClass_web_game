<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#2D1B4E"/>
    </linearGradient>
  </defs>
  <!-- Outer glow aura -->
  <polygon points="32,3 26,42 32,45 38,42" fill="#7B2FBE" opacity="0.15" filter="url(#glow)"/>
  <!-- Blade body -->
  <polygon points="32,5 27,40 32,43 37,40" fill="url(#bladeGrad)" stroke="#1A0A2E" stroke-width="0.5"/>
  <!-- Glowing purple edge - left -->
  <polyline points="32,5 27,40 32,43" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <!-- Glowing purple edge - right -->
  <polyline points="32,5 37,40 32,43" fill="none" stroke="#9333EA" stroke-width="1" opacity="0.6"/>
  <!-- Blade inner gleam -->
  <polygon points="32,8 29,38 32,41" fill="#3B1D6E" opacity="0.5"/>
  <!-- Guard -->
  <path d="M20,41 Q26,38 32,43 Q38,38 44,41 Q38,45 32,44 Q26,45 20,41Z" fill="#2D1B4E" stroke="#7B2FBE" stroke-width="0.8"/>
  <path d="M22,41 Q27,39 32,43 Q37,39 42,41" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.5"/>
  <!-- Handle -->
  <rect x="29.5" y="44" width="5" height="12" rx="1" fill="#1A0A2E" stroke="#2D1B4E" stroke-width="0.8"/>
  <!-- Handle wrapping -->
  <line x1="29.5" y1="47" x2="34.5" y2="46" stroke="#7B2FBE" stroke-width="0.6" opacity="0.7"/>
  <line x1="29.5" y1="50" x2="34.5" y2="49" stroke="#7B2FBE" stroke-width="0.6" opacity="0.7"/>
  <line x1="29.5" y1="53" x2="34.5" y2="52" stroke="#7B2FBE" stroke-width="0.6" opacity="0.7"/>
  <!-- Pommel gem -->
  <circle cx="32" cy="58" r="3" fill="#1A0A2E" stroke="#2D1B4E" stroke-width="0.8"/>
  <circle cx="32" cy="58" r="1.8" fill="#7B2FBE" filter="url(#glow)" opacity="0.9"/>
  <circle cx="31.5" cy="57.5" r="0.6" fill="#D8B4FE" opacity="0.7"/>
</svg>